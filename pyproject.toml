[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gnubeans-mapping-tui"
version = "0.2.0"
description = "Beancount Commodity Symbol Editor TUI"
requires-python = ">=3.11"
dependencies = [
    "blessed>=1.44.0",
    "rich>=13",
    "textual>=8.2.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=7",
]

[dependency-groups]
dev = [
    "pytest>=7",
    "pytest-bdd>=8.1.0",
]

[tool.pytest.ini_options]
pythonpath = ["."]
