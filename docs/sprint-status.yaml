# sprint-status.yaml
# Epic 3 — Edit Target Tokens and Resolve Collisions
# Drop into: docs/sprint-status-epic3.yaml
# Updated: 2026-06-24

schema_version: 1

epic:
  id: 3
  title: Edit Target Tokens and Resolve Collisions
  spec_ref: docs/tui_architecture_spec.md
  storyboard_ref: docs/tui_interaction_storyboard.md
  functional_requirements: [FR8, FR15, FR16, FR17, FR18, FR19, FR20, FR21, FR22, FR23]

sprint: 1
# status values: todo | in_progress | done | blocked
# prerequisite: TASK-001 (Epic 2 dispatch infrastructure) must be complete

tasks:

  - key: TASK-005
    type: task
    title: Add edit-mode selectors for ghost text, concrete value, and source pointer
    status: done
    assignee: null
    depends_on: []
    files:
      - mapping_resolution_tui/selectors.py
    summary: >
      Add the edit-specific derived-state functions that the renderer and
      reducer will call during EDITING mode. Existing selectors cover
      browsing-mode derivation only; none address the edit buffer ghost
      suffix, rendered display value, validation input, or source pointer
      autofill. Prerequisite for all three Epic 3 stories.
    acceptance_criteria:
      - "select_ghost_suffix(state, mapping) returns the remaining suffix of
        the default source value when: mapping.targetValue is None,
        edit.cursor == len(edit.buffer), and edit.buffer is a case-sensitive
        prefix of the default source effective value; returns '' otherwise (FR17)"
      - "select_concrete_value(state, mapping) returns edit.buffer if
        non-empty, else the default source effective value; this is the single
        value passed to targetPolicy.validate() and committed on submit (FR22)"
      - "select_source_pointer_value(state, mapping) returns the effective
        value of the source at edit.source_pointer_index within
        select_active_sources(mapping), or None when source_pointer_index
        is None (FR21)"
      - "select_edit_render_row(state, mapping) returns a dataclass with
        everything the renderer needs for the expanded edit row: buffer text,
        ghost suffix, cursor offset, validation icon and error message, focus
        region, and visible sources with pointer indicator position"
      - "All functions are pure, accept frozen state, return new objects or
        primitives — no side effects"
      - "All functions covered by unit tests"
    implementation_notes:
      - "Ghost suffix must handle the empty-buffer case: when edit.buffer is
        empty and mapping.targetValue is None, the full default source value
        is the ghost suffix"
      - "select_concrete_value is the single source of truth — do not
        replicate its logic in the reducer submit handler"
      - "select_active_sources is already implemented; select_source_pointer_value
        should delegate to it rather than re-filtering"
      - "select_edit_render_row should be the only selector the renderer calls
        for the expanded row — keep rendering logic out of the selector itself"

  - key: TASK-006
    type: story
    title: Enter edit mode and type with ghost text and validation
    status: todo
    assignee: null
    depends_on: [TASK-001, TASK-005]
    functional_requirements: [FR15, FR17, FR18, FR19, FR20]
    files:
      - mapping_resolution_tui/reducer.py
      - mapping_resolution_tui/renderer.py
    golden_frames:
      - frame_4   # Enter from filtered browsing; empty buffer; ghost text; reverse-video cursor
      - frame_5   # Valid buffer "ATT" with checkmark; submit hint in footer
      - frame_9   # Editing "APPLE" mapping with ghost suffix streaming
      - frame_10  # Invalid input "44PL"; error icon; error message
      - frame_11  # 24-character buffer; max-length flash error
    user_story: >
      As a reviewer, I want to enter edit mode on a selected mapping and
      type a replacement token with live ghost text and validation feedback,
      so that I can confidently set or correct a target value before
      submitting.
    acceptance_criteria:
      - "Pressing Enter in BROWSING mode transitions to EDITING: mode =
        EDITING, edit.mapping_ordinal = selected ordinal, edit.buffer = ''
        when mapping.targetValue is None else edit.buffer = mapping.targetValue,
        edit.cursor = len(edit.buffer), edit.focus_region = TOKEN_INPUT,
        edit.source_pointer_index = None, edit.source_entry_buffer = None (FR15)"
      - "Ghost suffix rendered when buffer is a prefix of the default source
        value at cursor end and no literal target override exists; disappears
        as soon as the buffer deviates from the default (FR17)"
      - "Printable character inserted at cursor position, cursor advances by
        1, ghost suffix and validation recomputed on every keystroke (FR18)"
      - "Invalid printable characters (per targetPolicy) insert into the
        buffer, set validation.status = INVALID with error icon and error
        message, and gate the submit key (FR19)"
      - "Over-limit characters are discarded; edit.max_length_flash_until set
        to now + flash_duration; flash error renders immediately;
        max_length_flash_until clears on next accepted edit change or mode
        exit (FR20)"
      - "Backspace removes the character before the cursor when focus_region
        = TOKEN_INPUT and edit.buffer is non-empty; cursor decrements by 1"
      - "Readline aliases for cursor movement and deletion (ctrl+a, ctrl+e,
        ctrl+k, ctrl+u, ctrl+b, ctrl+f, ctrl+h) behave as specified in FR18"
      - "Golden frame frame_4 committed: Enter from filtered browsing state,
        empty buffer, ghost text visible, reverse-video cursor, row expanded,
        surrounding rows super-dim"
      - "Golden frame frame_5 committed: valid buffer ATT with checkmark icon,
        submit hint added to footer"
      - "Golden frame frame_9 committed: editing APPLE mapping with ghost
        suffix streaming"
      - "Golden frame frame_10 committed: invalid input 44PL, error icon,
        error 'Error: must start with A-Z'"
      - "Golden frame frame_11 committed: 24-character buffer, max-length
        flash 'Error: 24 chars max'"
      - "All existing golden tests continue to pass"
    definition_of_done:
      - "Feature is implemented and tested"
      - "BDD scenario for edit mode entry and typed input passes (step
        definitions wired to action dispatch)"
      - "Golden frames frame_4, frame_5, frame_9, frame_10, frame_11
        committed and passing under uv run pytest"

  - key: TASK-007
    type: story
    title: Navigate alternative sources and autofill the edit buffer
    status: done
    assignee: null
    depends_on: [TASK-001, TASK-005]
    functional_requirements: [FR21]
    files:
      - mapping_resolution_tui/reducer.py
    golden_frames:
      - frame_12a  # Source pointer on first source; buffer matches source value; checkmark
      - frame_12b  # Source pointer on second source; buffer updated to match
    user_story: >
      As a reviewer, I want to navigate the list of available sources and
      autofill my edit buffer from the selected source's effective value,
      so that I can quickly choose an established token without re-typing.
    acceptance_criteria:
      - "Pressing down-arrow from focus_region = TOKEN_INPUT saves edit.buffer
        to edit.source_entry_buffer, sets source_pointer_index to first active
        source index, sets focus_region = SOURCE_LIST, and autofills
        edit.buffer with that source's effective value; validation
        recomputed (FR21)"
      - "Pressing up-arrow from TOKEN_INPUT saves buffer to source_entry_buffer,
        sets source_pointer_index to last active source index, sets
        focus_region = SOURCE_LIST, and autofills buffer; validation
        recomputed (FR21)"
      - "Up/down within SOURCE_LIST moves source_pointer_index through active
        sources with wrapping; buffer autofilled from pointed source effective
        value and validation recomputed on every move (FR21)"
      - "Moving up past the first source (or down past the last) restores
        source_entry_buffer to edit.buffer, clears source_pointer_index and
        source_entry_buffer, and returns focus_region to TOKEN_INPUT (FR21)"
      - "Typing a printable character or pressing Backspace while in
        SOURCE_LIST exits source navigation: clears source_pointer_index and
        source_entry_buffer, applies the character edit to edit.buffer as a
        TOKEN_INPUT operation, returns focus_region = TOKEN_INPUT, and
        revalidates (FR21)"
      - "Source pointer indicator rendered in source column next to active
        source; un-pointed sources render without indicator"
      - "Golden frame frame_12a committed: pointer on first source
        (cmdty_id: 'AAPL'), buffer matches source value, checkmark icon"
      - "Golden frame frame_12b committed: pointer on second source
        (user_symbol: 'APPLE'), buffer updated to match"
      - "All existing golden tests continue to pass"
    definition_of_done:
      - "Feature is implemented and tested"
      - "BDD scenario for source list navigation and autofill passes"
      - "Golden frames frame_12a and frame_12b committed and passing under
        uv run pytest"

  - key: TASK-008
    type: story
    title: Submit or cancel an edit with filter preservation and live collision resolution
    status: todo
    assignee: null
    depends_on: [TASK-001, TASK-005]
    functional_requirements: [FR8, FR16, FR22, FR23]
    files:
      - mapping_resolution_tui/reducer.py
      - mapping_resolution_tui/selectors.py
      - mapping_resolution_tui/renderer.py
    golden_frames:
      - frame_esc_from_edit   # Esc returns to pre-edit browsing frame with filter intact
      - frame_submit_no_resolution  # Valid submit; returns to BROWSING; row updated; collisions recalculated
    user_story: >
      As a reviewer, I want submitting or cancelling an edit to return me
      to my browsing context with filters intact, and for collision
      indicators to update live as I type, so that I always know whether
      my edit resolves an outstanding conflict.
    acceptance_criteria:
      - "Pressing Enter when edit.validation.status = VALID and edit.buffer
        is non-empty commits edit.buffer literally to mapping.targetValue
        and exits EDITING (FR22)"
      - "If the committed edit resolves the final collision
        (select_unresolved_collision_count() == 0 after commit), mode
        transitions to CONFIRMING with confirmation.kind = ACCEPT and
        confirmation.choice = NO (FR23)"
      - "If collisions remain after commit, mode returns to BROWSING with
        selectedOrdinal, filter.text, filter.collision_only, filter.cursor,
        and filter.raw identical to their state when editing began (FR16)"
      - "Pressing Enter when validation is not VALID leaves mode = EDITING;
        no commit occurs and the error remains visible (FR18)"
      - "Pressing Esc or ctrl+c discards the edit buffer, resets edit to
        None, and returns to BROWSING with all filter state preserved
        exactly as it was on entry (FR16)"
      - "On every edit keystroke, collision groups and
        select_unresolved_collision_count are recomputed with edit.buffer
        substituted for the edited mapping's targetValue; the collision
        indicator on the edited row updates live (FR8)"
      - "A mapping with an empty buffer is treated as unresolved for
        collision purposes during live recomputation (FR8)"
      - "Golden frame frame_esc_from_edit committed: state returns to the
        pre-edit browsing frame with filter intact"
      - "Golden frame frame_submit_no_resolution committed: returns to
        BROWSING with the edited row's targetValue updated and collision
        indicators recalculated"
      - "All existing golden tests continue to pass"
    definition_of_done:
      - "Feature is implemented and tested"
      - "BDD scenarios for submit, cancel, and live collision recomputation
        all pass"
      - "All relevant golden frames committed and passing under uv run pytest"