# sprint-status.yaml
# Epic 2 — Browse, Filter, and Navigate Mappings
# Drop into: docs/sprint-status.yaml
# Updated: 2026-06-26
#
# NOTE (2026-06-25): aligned with the reworked render layout contract
# (tui_architecture_spec.md S6.1/S6.2/S6.7, S8). The frame is a variable-height
# inline render, not a fixed 15x75 grid: it ends at the footer with no trailing
# blank padding, and scrolling engages only when content+chrome overflows the
# host terminal. Golden snapshots for the under-full browsing frames referenced
# below (frame_2, frame_3, frame_8, frame_13, frame_esc_clear) MUST be captured
# against this contract.
#
# NOTE (2026-06-26): aligned with the bang-autocomplete filter contract
# (tui_architecture_spec.md S3.2/S3.3/S4.2/S5/S5.1/S6.5/S6.6/S10). filter.raw is
# now the single editable buffer and the source of truth; collisionOnly (raw
# begins with "!") and text (raw minus a single leading "!") are DERIVED after
# every mutation. There is no collisionOnly toggle: "!" is an ordinary editable
# character, and Tab / ctrl+i autocompletes a leading "!" into filter.raw only
# when the "Tab to view collisions" ghost is visible (filter.raw empty with at
# least one unresolved collision); it is otherwise a no-op (a second Tab does
# NOT clear the "!"). Backspace at cursor 0 is a no-op; the leading "!" deletes
# like any other character. filter.cursor indexes filter.raw, including any
# leading "!".

schema_version: 1

epic:
  id: 2
  title: Browse, Filter, and Navigate Mappings
  spec_ref: docs/tui_architecture_spec.md
  storyboard_ref: docs/tui_interaction_storyboard.md
  functional_requirements: [FR9, FR10, FR11, FR12, FR13, FR14, FR28, FR29, FR30]

sprint: 1
# status values: todo | in_progress | done | blocked

tasks:

  - key: TASK-001
    type: task
    title: Wire action dispatch infrastructure
    status: todo
    assignee: null
    depends_on: []
    files:
      - mapping_resolution_tui/actions.py
      - mapping_resolution_tui/reducer.py
      - mapping_resolution_tui/loop.py
    summary: >
      Establish the Redux-style dispatch plumbing that all Epic 2 stories
      depend on. Currently actions.py is an empty stub, reducer.py only
      contains make_initial_state(), and loop.py prints a static frame
      with no input handling.
    acceptance_criteria:
      - "actions.py defines action dataclasses for all browsing-mode filter
        operations: character insertion (including a literal !), cursor
        movement (left/right), Tab-autocomplete of a leading ! collision
        metafilter (guarded by the ghost), backspace delete, and filter clear
        (Esc). There is no collision-only toggle action"
      - "reducer.py exposes a reduce(state: AppState, action) -> AppState
        dispatch function that delegates to per-action handlers and returns
        a new immutable state"
      - "loop.py implements a blocking event loop: read keypress → normalise
        readline-style aliases → dispatch action → re-derive state via
        selectors → re-render"
      - "Unsupported keys and unrecognised control sequences leave state and
        rendered output unchanged (FR30)"
      - "Loop exits cleanly on the configured quit key"
    implementation_notes:
      - "All state mutations must return new frozen dataclasses — no in-place
        mutation"
      - "Readline alias normalisation (e.g. ctrl+b → cursor-left) belongs in
        the input layer before the action is constructed (FR29)"
      - "FilterState.raw is the single editable buffer and the source of
        truth; collision_only (raw begins with !) and text (raw minus a single
        leading !) are DERIVED from raw after every mutation. select_filter_prompt
        renders filter.raw literally, including any leading !"
      - "This task is a prerequisite for all three Epic 2 stories; implement
        first or in parallel with writing the BDD step stubs"

  - key: TASK-002
    type: story
    title: Text filter input with cursor and match highlights
    status: todo
    assignee: null
    depends_on: [TASK-001]
    functional_requirements: [FR9, FR11, FR29]
    files:
      - mapping_resolution_tui/actions.py
      - mapping_resolution_tui/reducer.py
      - mapping_resolution_tui/renderer.py
      - mapping_resolution_tui/loop.py
    golden_frames:
      - frame_8  # filter text "1"; rows 1, 4, 10, 11 visible; bold spans; single-char input proven
    user_story: >
      As a reviewer, I want to type a text filter that matches mapping
      ordinals and target tokens only, so that I can quickly narrow the
      review list without source values creating false matches.
    acceptance_criteria:
      - "Typing a printable character in BROWSING mode inserts it into
        filter.raw at filter.cursor and advances the cursor by 1"
      - "Left/right arrow (and readline aliases ctrl+b / ctrl+f) move
        filter.cursor within filter.raw, clamped to [0, len(filter.raw)]"
      - "Backspace / ctrl+h removes the character before the cursor in
        filter.raw when filter.cursor > 0, and is a no-op at cursor 0"
      - "Home / ctrl+a moves filter.cursor to 0; End / ctrl+e moves it to
        len(filter.raw) (readline beginning-of-line / end-of-line) — the
        line-editing portion of FR9"
      - "Delete / ctrl+d removes the character at filter.cursor (forward
        delete-char) and is a no-op when the cursor is at the end of
        filter.raw"
      - "ctrl+k deletes from filter.cursor through the end of filter.raw
        (kill-line); ctrl+u deletes from the start of filter.raw through the
        cursor and resets filter.cursor to 0 (unix-line-discard)"
      - "ctrl+w / meta+backspace deletes the previous word before the cursor
        and meta+d deletes the next word from the cursor, using ASCII word
        boundaries wordChar = [A-Za-z0-9_-] (spec S5.1)"
      - "Every line-editing mutation re-runs the post-mutation sequence: clamp
        filter.cursor to [0, len(filter.raw)], re-derive collision_only and
        text from filter.raw, re-derive visible rows, and clamp selection
        (spec S5.1)"
      - "The input layer normalises the readline aliases ctrl+a, ctrl+e,
        ctrl+d, ctrl+k, ctrl+u, ctrl+w (and meta+d / meta+backspace) to these
        actions before dispatch (FR29), completing the browsing-filter
        line-editing aliases on the spec S5.1 must-test list"
      - "No-op readline families leave filter state and rendered output
        unchanged, with at least one test per family: abort (ctrl+g),
        quoted-insert (ctrl+q / ctrl+v), undo (ctrl+_), transpose (ctrl+t),
        yank (ctrl+y), reverse-search (ctrl+r); ctrl+l re-renders only and
        MUST NOT mutate state (spec S5.1)"
      - "select_visible_rows filters by ordinal string and current target
        token value, ASCII case-insensitively; source labels, sanitised
        values, and effective values are excluded from matching"
      - "Non-overlapping matched spans in the ordinal display and target
        token cell are exposed as bold highlight metadata in rendered output
        (frame 3: ordinal 3 and token AT-T bold when filter is 3)"
      - "Filter cursor position is reflected in the rendered filter prompt
        (cursor block appears at the correct character offset)"
      - "Golden frame frame_8 committed: filter text '1' active, rows 1, 4
        (token C100-F), 10, 11 visible with correct bold highlight spans;
        demonstrates single-character input, row narrowing, and highlight
        metadata in a collision-free dataset"
      - "frame_8 is an under-full state (4 rows): the rendered frame ends at
        the footer with no trailing blank padding below it, per the
        variable-height layout contract (spec S6.1/S6.2)"
      - "All existing golden tests continue to pass"
    definition_of_done:
      - "Feature is implemented and tested"
      - "BDD scenario for text filtering passes (step definitions wired to
        action dispatch)"
      - "Readline line-editing aliases (ctrl+a / ctrl+e / ctrl+d / ctrl+k /
        ctrl+u / ctrl+w, meta+d / meta+backspace) and one no-op-per-family
        test pass under uv run pytest (spec S5.1 must-test coverage)"
      - "Golden frame frame_8 committed and passing under uv run pytest"

  - key: TASK-003
    type: story
    title: Collision metafilter via bang autocomplete and filter clear
    status: todo
    assignee: null
    functional_requirements: [FR10]
    depends_on: [TASK-001]
    files:
      - mapping_resolution_tui/actions.py
      - mapping_resolution_tui/reducer.py
      - mapping_resolution_tui/loop.py
      - mapping_resolution_tui/renderer.py
    golden_frames:
      - frame_2         # Tab autocompletes leading ! from 1a; filter.raw="!"; collision-only derived; rows 2 and 3 visible
      - frame_esc_clear # Esc from filtered state; all rows restored; identical to frame_1a
    user_story: >
      As a reviewer, I want to engage the collision metafilter with a single
      Tab and clear all active filters with Esc, so that I can focus on what
      needs resolving without manual scrolling or re-typing.
    acceptance_criteria:
      - "Pressing Tab / ctrl+i autocompletes a leading ! into filter.raw and
        sets filter.cursor = 1, but ONLY when the 'Tab to view collisions'
        ghost is visible (filter.raw is empty and at least one unresolved
        collision exists); collision_only is then True by derivation"
      - "Tab / ctrl+i is a no-op in every other situation: a second Tab does
        NOT clear the inserted !, Tab does NOT autocomplete when filter.raw is
        non-empty, and Tab does NOT autocomplete when no unresolved collisions
        exist"
      - "Typing ! inserts a literal ! into filter.raw at filter.cursor like any
        other printable character; a ! at index 0 becomes the collision
        metafilter (collision_only derived True), a ! elsewhere is ordinary
        search text"
      - "When filter.raw == '!' (metafilter only), the prompt renders the
        leading ! followed by the dim 'Type to filter' ghost with only T
        reverse-video (frame 2: Filter: !*T*__ype to filter__)"
      - "Pressing Esc in BROWSING mode clears filter.raw when it is non-empty
        (clearing both the derived metafilter and the search text) and resets
        filter.cursor to 0"
      - "Backspace / ctrl+h at filter.cursor 0 is a no-op; a leading ! is
        deleted like any other character by backspacing when filter.cursor is
        1, which clears the derived metafilter"
      - "When filter.raw begins with ! and carries trailing search text (e.g.
        '!3'), only unresolved collision rows matching the text are shown
        (storyboard frame 3)"
      - "filter.raw is the source of truth; collision_only (raw begins with !)
        and text (raw minus a single leading !) are DERIVED after every
        mutation — the reducer never stores them independently"
      - "Golden frame frame_2 committed: Tab autocompletes a leading ! from
        frame_1a (filter.raw='!', filter.cursor=1, collision-only derived),
        rows 2 and 3 visible"
      - "Golden frame frame_esc_clear committed: filter fully cleared, all
        rows restored, output identical to frame_1a"
      - "frame_2 is an under-full state (2 rows): the rendered frame ends at
        the footer with no trailing blank padding below it (spec S6.1/S6.2);
        frame_esc_clear matches the updated frame_1a, including its corrected
        single-space-shorter footer hint indent"
      - "All existing golden tests continue to pass"
    definition_of_done:
      - "Feature is implemented and tested"
      - "BDD scenario for bang autocomplete (Tab inserts a leading ! only when
        the ghost is visible; second Tab and no-collision Tab are no-ops; ! is
        ordinary editable text) and Esc clear passes"
      - "Golden frames frame_2 and frame_esc_clear committed and passing
        under uv run pytest"

  - key: TASK-004
    type: story
    title: Selection clamping, browsing navigation, and empty-result rendering
    status: todo
    assignee: null
    depends_on: [TASK-001]
    functional_requirements: [FR12, FR13, FR14]
    files:
      - mapping_resolution_tui/actions.py
      - mapping_resolution_tui/reducer.py
      - mapping_resolution_tui/selectors.py
      - mapping_resolution_tui/renderer.py
      - mapping_resolution_tui/loop.py
    golden_frames:
      - frame_3    # filter.raw="!3" (collision-only derived + text "3"); ordinal 3 selected and highlighted
      - frame_13   # no-match state; single blank body row; error footer; frame ends at footer, no filler rows
    user_story: >
      As a reviewer, I want selection to remain predictable when filters
      change or match nothing, so that browsing never points at a hidden
      row or an invalid mapping.
    acceptance_criteria:
      - "When a filter change leaves the currently selected ordinal visible,
        selectedOrdinal is unchanged"
      - "When a filter change removes the selected ordinal but other rows
        remain, selectedOrdinal clamps to the first visible row's ordinal"
      - "When the collision metafilter is engaged from frame_1a (Tab
        autocompletes a leading !; ordinal 1 selected), selectedOrdinal
        becomes 2 (first collision row), not 1"
      - "When filter.raw becomes '!3' (collision-only derived, text '3'),
        selectedOrdinal becomes 3; only ordinal 3 is visible (frame 3)"
      - "Up / down arrows (and readline aliases ctrl+p / ctrl+n) move
        selectedOrdinal by -1 / +1 within visibleRows, clamped at the first
        and last visible row (FR14 row movement)"
      - "Shift+up / Shift+down and PgUp / PgDn page the view by the current
        non-editing body capacity; PgDn clamps scrollOffset to maxOffset and
        PgUp clamps to 0, and after paging the selected row becomes the first
        visible row (FR14 page movement; spec S8.3/S8.5)"
      - "Browsing movement uses anchored body allocation so the selected row
        is always kept visible (spec S8.2)"
      - "Page-key portability: PgUp / PgDn perform page movement even when the
        terminal cannot distinguish Shift+arrows from plain arrows, and
        indistinguishable plain arrows still move exactly one row (spec S5)"
      - "When a filter produces no matching rows, visibleRows is empty and
        selectedOrdinal is None"
      - "When visibleRows is empty in BROWSING mode, one blank table body
        row is rendered below the header with no row cursor"
      - "The footer renders 'Error: no matching rows  ·  esc clear filter'
        when visibleRows is empty (storyboard frame 13)"
      - "The empty-result frame is variable-height and ends at the footer: it
        is the single blank body row, the separator, and the footer with NO
        blank filler rows padded below the footer or to the terminal bottom
        (reworked spec S6.1/S6.2; frame_13 no longer renders trailing blanks)"
      - "filter.cursor is clamped to [0, len(filter.raw)] after any filter.raw
        mutation; reset to 0 only when filter.raw is cleared by Esc"
      - "Golden frame frame_3 committed: collision-only + text filter 3
        active, ordinal 3 selected and highlighted"
      - "Golden frame frame_13 committed: no-match state, blank body row,
        error footer"
      - "All existing golden tests continue to pass"
    definition_of_done:
      - "Feature is implemented and tested"
      - "BDD scenario for selection clamping and empty results passes"
      - "BDD scenario for browsing row and page movement passes (up/down,
        ctrl+p/ctrl+n, PgUp/PgDn keep the selected row visible and clamp at
        the list ends)"
      - "Golden frames frame_3 and frame_13 committed and passing under
        uv run pytest"