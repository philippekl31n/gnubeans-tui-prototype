# sprint-status.yaml
# Epic 4 — Confirm or Exit the Mapping Session
# Drop into: docs/sprint-status-epic4.yaml
# Updated: 2026-06-24

schema_version: 1

epic:
  id: 4
  title: Confirm or Exit the Mapping Session
  spec_ref: docs/tui_architecture_spec.md  # sections 4.1, 4.2, 5, 6.4–6.6
  storyboard_ref: docs/tui_interaction_storyboard.md

sprint: 1
# status values: todo | in_progress | done | blocked
# prerequisite: TASK-001 (Epic 2 dispatch) and TASK-008 (Epic 3 FR23 auto-confirm) must be complete

tasks:

  - key: TASK-009
    type: task
    title: Add confirmation-mode selectors and renderer case
    status: todo
    assignee: null
    depends_on: []
    files:
      - mapping_resolution_tui/selectors.py
      - mapping_resolution_tui/renderer.py
    summary: >
      Add the derived-state functions and renderer case for CONFIRMING mode.
      select_footer_content partially handles CONFIRMING mode but there is
      no selector for the prompt content itself and render_lines() has no
      case for Mode.CONFIRMING. Prerequisite for all Epic 4 stories.
    acceptance_criteria:
      - "select_confirmation_prompt(state) returns a dataclass with: prompt
        text ('Accept all?' or 'Skip adding commodities?'), raw 'Y'/'y' and 'N'/'n'
        indicator strings, and a flag for whether YES is currently active. The
        renderer applies reverse-video on the active choice character."
      - "select_confirmation_header(state) returns the header line text for
        CONFIRMING mode as specified in spec section 6.4"
      - "render_lines() handles Mode.CONFIRMING: full table at current scroll
        offset, confirmation prompt overlaid below the table, confirmation
        header and footer (spec sections 6.4–6.6)"
      - "Prompt format: 'Accept all? [y/*N*]' and 'Skip adding commodities?
        [y/*N*]' with reverse-video on the active choice character"
      - "CONFIRMING mode renders full table with no super-dim rows"
      - "All functions are pure, accept frozen state, no side effects"
      - "All functions covered by unit tests"
    implementation_notes:
      - "Drive prompt rendering entirely from select_confirmation_prompt —
        avoid branching on ConfirmationKind inside the renderer"
      - "Reverse-video convention for active choice (*N*) is consistent with
        cursor indicators used elsewhere in the renderer"
      - "Scrolling in CONFIRMING mode works identically to BROWSING — no
        selectedOrdinal cursor is rendered, only scroll offset applies"

  - key: TASK-010
    type: story
    title: Accept all resolved mappings and produce output
    status: todo
    assignee: null
    depends_on: [TASK-001, TASK-009]
    files:
      - mapping_resolution_tui/reducer.py
      - mapping_resolution_tui/renderer.py
    golden_frames:
      - frame_6   # ACCEPT confirmation entered; prompt shown; NO active; full table
      - frame_14  # Re-entry via ctrl+s from BROWSING; matches frame_6
      - frame_accept_terminal  # TUI exits cleanly with mappings applied
    user_story: >
      As a reviewer, I want to accept all my resolved mappings and produce
      the output file, so that the commodity import is applied with my
      corrections.
    acceptance_criteria:
      - "Entering ACCEPT confirmation (FR23 auto-trigger or ctrl+s from
        BROWSING when unresolved collision count == 0) sets mode = CONFIRMING,
        confirmation.kind = ACCEPT, confirmation.choice = NO"
      - "ctrl+s accepted from BROWSING whenever select_unresolved_collision_count()
        == 0, regardless of whether collisions were just resolved or were
        already resolved"
      - "y key sets confirmation.choice = YES; n sets choice = NO;
        left/right arrows toggle between YES and NO"
      - "Enter when choice = YES commits all mappings and exits the TUI
        (terminal accept state)"
      - "Enter when choice = NO, or Esc, returns to BROWSING with filter
        state preserved"
      - "Footer renders 'scroll · shift pageup/dn · enter edit mappings'
        when choice = NO; 'scroll · shift pageup/dn · enter submit mappings'
        when choice = YES (spec section 6.6; the accept/YES footer appears in
        no storyboard frame)"
      - "Golden frame frame_6 committed: ACCEPT confirmation after last
        collision resolved; 'Accept all? [y/*N*]'; full table visible; NO
        reverse-video active; footer 'enter edit mappings' (identical to
        frame 7a — no 'enter confirm')"
      - "Golden frame frame_14 committed: re-entry via ctrl+s after returning
        to BROWSING; state matches frame_6"
      - "Golden frame frame_accept_terminal committed: TUI exits cleanly with
        mappings applied"
      - "All existing golden tests continue to pass"
    definition_of_done:
      - "Feature is implemented and tested"
      - "BDD scenario for accept confirmation flow (auto-entry, ctrl+s entry,
        y/n toggle, accept, return to browsing) passes"
      - "Golden frames frame_6, frame_14, and frame_accept_terminal committed
        and passing under uv run pytest"

  - key: TASK-011
    type: story
    title: Scroll and verify the full mapping table while confirmation is shown
    status: todo
    assignee: null
    depends_on: [TASK-001, TASK-009]
    files:
      - mapping_resolution_tui/reducer.py
      - mapping_resolution_tui/renderer.py
    golden_frames:
      - frame_7a  # Down-arrow in ACCEPT confirmation; table scrolled one row; prompt unchanged
    user_story: >
      As a reviewer, I want to scroll through the full mapping table while
      a confirmation prompt is shown, so that I can verify all my changes
      before committing or declining.
    acceptance_criteria:
      - "In CONFIRMING mode, up/down arrows scroll the table body by one row;
        selectedOrdinal is unaffected (no row cursor in CONFIRMING mode)"
      - "Shift+up / shift+down scroll by one page"
      - "Table renders at current scroll offset with all mappings at normal
        brightness — no super-dim rows"
      - "Confirmation prompt remains visible below the table body at all
        scroll positions"
      - "Footer shows scroll and page-scroll hints plus the context-sensitive
        action hint at all scroll positions"
      - "Scroll offset is clamped: cannot scroll past the first or last row"
      - "Golden frame frame_7a committed: one down-arrow press in ACCEPT
        confirmation; table scrolled by one row; prompt and footer unchanged"
      - "All existing golden tests continue to pass"
    definition_of_done:
      - "Feature is implemented and tested"
      - "BDD scenario for table scrolling within CONFIRMING mode passes"
      - "Golden frame frame_7a committed and passing under uv run pytest"

  - key: TASK-012
    type: story
    title: Exit without saving with a double ctrl+c guard against accidental discard
    status: todo
    assignee: null
    depends_on: [TASK-001, TASK-009]
    files:
      - mapping_resolution_tui/reducer.py
      - mapping_resolution_tui/renderer.py
    golden_frames:
      - frame_1b  # ctrl+c from BROWSING with collisions; EXIT prompt; NO active
    user_story: >
      As a reviewer, I want to be warned before abandoning my mapping
      session and required to press ctrl+c twice to force-exit, so that
      I don't accidentally discard my work.
    acceptance_criteria:
      - "ctrl+c in BROWSING enters EXIT confirmation: mode = CONFIRMING,
        confirmation.kind = EXIT, confirmation.choice = NO,
        second_ctrl_c_armed = True"
      - "y key sets choice = YES; n sets choice = NO; left/right arrows
        toggle between YES and NO"
      - "Enter when choice = YES sets result.status = SKIPPED and exits
        without adding commodities (clean skip); it MUST NOT send SIGINT —
        SIGINT is reserved for the second ctrl+c force-exit (spec §4.1/§4.2)"
      - "Enter when choice = NO, or Esc, returns to BROWSING mode"
      - "A second ctrl+c while in EXIT confirmation sends SIGINT immediately,
        bypassing the y/n check entirely (second_ctrl_c_armed = True on
        entry, never reset within CONFIRMING state)"
      - "Prompt renders as 'Skip adding commodities? [y/*N*]' (spec
        section 6.5)"
      - "Footer shows scroll and page-scroll hints plus 'enter edit mappings'
        when choice = NO"
      - "Golden frame frame_1b committed: ctrl+c from BROWSING with unresolved
        collisions; EXIT prompt shown; full table visible; NO active"
      - "All existing golden tests continue to pass"
    definition_of_done:
      - "Feature is implemented and tested"
      - "BDD scenarios for exit confirmation (y → SKIPPED clean exit,
        n/esc → return to browsing, second ctrl+c → SIGINT) all pass"
      - "Golden frame frame_1b committed and passing under uv run pytest"
